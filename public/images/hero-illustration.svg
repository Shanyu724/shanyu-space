<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none">
  <!-- 背景圆形淡光 -->
  <circle cx="160" cy="120" r="110" fill="#f5f0e8" opacity="0.6"/>
  <circle cx="160" cy="120" r="110" stroke="#ddd0ba" stroke-width="0.5" fill="none" opacity="0.4" stroke-dasharray="2 4"/>

  <!-- 一本打开的笔记本（手账感） -->
  <g transform="translate(60, 70)">
    <!-- 左侧页面 -->
    <path d="M0 10L95 5L100 95L5 100Z" fill="#faf7f2" stroke="#cbb59a" stroke-width="0.8"/>
    <!-- 右侧页面 -->
    <path d="M105 5L200 10L195 100L100 95Z" fill="#faf7f2" stroke="#cbb59a" stroke-width="0.8"/>
    <!-- 中缝 -->
    <line x1="100" y1="5" x2="100" y2="95" stroke="#bc9f80" stroke-width="1"/>

    <!-- 左侧手写线条 -->
    <g stroke="#8b9bb5" stroke-width="1.2" stroke-linecap="round" opacity="0.6">
      <line x1="15" y1="22" x2="80" y2="20"/>
      <line x1="15" y1="32" x2="75" y2="30"/>
      <line x1="15" y1="42" x2="85" y2="41"/>
      <line x1="15" y1="52" x2="70" y2="51"/>
    </g>

    <!-- 右侧：便签 -->
    <rect x="125" y="18" width="55" height="30" fill="#fef3c7" transform="rotate(3 152 33)" stroke="#d4a76a" stroke-width="0.3"/>
    <g stroke="#92400e" stroke-width="0.6" opacity="0.7" transform="rotate(3 152 33)">
      <line x1="130" y1="28" x2="175" y2="28"/>
      <line x1="130" y1="35" x2="170" y2="35"/>
      <line x1="130" y1="42" x2="165" y2="42"/>
    </g>

    <!-- 右侧：胶带 -->
    <rect x="140" y="55" width="40" height="8" fill="#e5dfd3" opacity="0.7" transform="rotate(-5 160 59)"/>

    <!-- 右侧：手写 + 简笔画 -->
    <g stroke="#8b9bb5" stroke-width="1.2" stroke-linecap="round" opacity="0.6">
      <line x1="115" y1="72" x2="180" y2="71"/>
      <line x1="115" y1="82" x2="170" y2="81"/>
    </g>

    <!-- 一个小山形简笔画 -->
    <path d="M115 88L125 78L132 84L142 73L155 88" stroke="#4f6f4a" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 旁边一支铅笔 -->
  <g transform="translate(220, 130) rotate(20)">
    <rect x="0" y="0" width="80" height="6" fill="#ebc585"/>
    <rect x="0" y="0" width="80" height="3" fill="#d4a76a" opacity="0.6"/>
    <path d="M80 0L92 3L80 6Z" fill="#bc9f80"/>
    <path d="M92 3L96 3L92 3Z" stroke="#3a342c" stroke-width="1"/>
    <rect x="-10" y="0" width="10" height="6" fill="#c08d4f"/>
    <rect x="-10" y="0" width="10" height="3" fill="#a8723f"/>
  </g>

  <!-- 旁边一朵小花 -->
  <g transform="translate(40, 60)">
    <line x1="0" y1="0" x2="0" y2="20" stroke="#6d8b67" stroke-width="1.5"/>
    <circle cx="-4" cy="2" r="2" fill="#95ad8f"/>
    <circle cx="0" cy="-5" r="4" fill="#fce7f3"/>
    <circle cx="-4" cy="-7" r="3" fill="#fce7f3"/>
    <circle cx="4" cy="-7" r="3" fill="#fce7f3"/>
    <circle cx="0" cy="-5" r="2" fill="#ebc585"/>
  </g>

  <!-- 漂浮的小雨滴 -->
  <g fill="#8b9bb5" opacity="0.5">
    <path d="M30 30C30 30 26 36 26 39C26 41.2 27.8 43 30 43C32.2 43 34 41.2 34 39C34 36 30 30 30 30Z"/>
    <path d="M280 50C280 50 277 55 277 57C277 58.7 278.3 60 280 60C281.7 60 283 58.7 283 57C283 55 280 50 280 50Z"/>
  </g>
</svg>