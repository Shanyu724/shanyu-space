<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- 远山轮廓（淡） -->
  <path d="M0 240L60 200L100 220L160 180L220 210L280 170L340 200L400 175L480 210L480 360H0Z"
        fill="#95ad8f" opacity="0.25"/>
  <!-- 中山 -->
  <path d="M0 280L40 250L90 270L140 220L200 260L260 215L320 255L380 225L440 260L480 245L480 360H0Z"
        fill="#6d8b67" opacity="0.35"/>
  <!-- 近山 -->
  <path d="M0 320L50 295L110 315L180 280L260 310L340 285L420 315L480 300L480 360H0Z"
        fill="#4f6f4a" opacity="0.45"/>

  <!-- 雨幕层（细密短线，疏密有致） -->
  <g stroke="#8b9bb5" stroke-linecap="round" opacity="0.55">
    <line x1="40" y1="20" x2="36" y2="38" stroke-width="1.2"/>
    <line x1="80" y1="50" x2="76" y2="68" stroke-width="1"/>
    <line x1="120" y1="30" x2="117" y2="48" stroke-width="1.3"/>
    <line x1="170" y1="60" x2="166" y2="80" stroke-width="1"/>
    <line x1="210" y1="20" x2="207" y2="38" stroke-width="1.2"/>
    <line x1="260" y1="55" x2="257" y2="73" stroke-width="1"/>
    <line x1="310" y1="30" x2="306" y2="50" stroke-width="1.3"/>
    <line x1="360" y1="65" x2="356" y2="85" stroke-width="1"/>
    <line x1="400" y1="35" x2="396" y2="55" stroke-width="1.2"/>
    <line x1="440" y1="55" x2="437" y2="73" stroke-width="1"/>
    <line x1="60" y1="100" x2="56" y2="118" stroke-width="1"/>
    <line x1="150" y1="110" x2="146" y2="128" stroke-width="1.2"/>
    <line x1="290" y1="100" x2="286" y2="120" stroke-width="1.1"/>
    <line x1="380" y1="105" x2="376" y2="125" stroke-width="1"/>
    <line x1="230" y1="135" x2="226" y2="155" stroke-width="1"/>
    <line x1="100" y1="150" x2="97" y2="170" stroke-width="1.1"/>
    <line x1="320" y1="140" x2="317" y2="158" stroke-width="1"/>
    <line x1="420" y1="150" x2="417" y2="168" stroke-width="1"/>
  </g>

  <!-- 大雨滴（点缀） -->
  <g fill="#8b9bb5" opacity="0.6">
    <path d="M85 75C85 75 78 87 78 92C78 95.4 81.1 98 85 98C88.9 98 92 95.4 92 92C92 87 85 75 85 75Z"/>
    <path d="M335 90C335 90 330 99 330 103C330 105.8 332.2 108 335 108C337.8 108 340 105.8 340 103C340 99 335 90 335 90Z"/>
    <path d="M195 145C195 145 191 152 191 155C191 157.2 192.8 159 195 159C197.2 159 199 157.2 199 155C199 152 195 145 195 145Z"/>
  </g>

  <!-- 山间小屋 -->
  <g opacity="0.7">
    <rect x="245" y="265" width="14" height="10" fill="#8b7658"/>
    <path d="M243 265L252 258L261 265H243Z" fill="#a08566"/>
    <rect x="251" y="270" width="2" height="5" fill="#3e573a"/>
  </g>

  <!-- 一棵小树 -->
  <g opacity="0.7">
    <rect x="165" y="282" width="2" height="6" fill="#8b7658"/>
    <circle cx="166" cy="278" r="5" fill="#6d8b67"/>
  </g>

  <!-- 太阳/月亮 透出云层 -->
  <circle cx="380" cy="60" r="22" fill="#f4ddb3" opacity="0.6"/>
  <circle cx="380" cy="60" r="22" stroke="#ebc585" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- 云 -->
  <g opacity="0.45">
    <ellipse cx="100" cy="80" rx="32" ry="10" fill="#f5f0e8"/>
    <ellipse cx="115" cy="75" rx="22" ry="8" fill="#f5f0e8"/>
    <ellipse cx="320" cy="130" rx="28" ry="9" fill="#f5f0e8"/>
    <ellipse cx="340" cy="125" rx="20" ry="7" fill="#f5f0e8"/>
  </g>

  <!-- 涟漪（山脚水边） -->
  <g stroke="#8b9bb5" stroke-width="0.8" fill="none" opacity="0.35">
    <ellipse cx="220" cy="340" rx="22" ry="3"/>
    <ellipse cx="220" cy="340" rx="14" ry="2"/>
    <ellipse cx="350" cy="350" rx="18" ry="2.5"/>
  </g>
</svg>